version: 1
model_card: trace_collection/llama-3.1-70b/llama-3.1-70b.yaml
description: Llama-3.1-70B inference on TPU v6e using vLLM with XLA backend and TP=8.
workload:
  phase: inference
  granularity: model_fwd
  data:
    batch_size: 64
    seq_len: 4096
    dataset: sharegpt
hardware:
  network_topo:
    topology: 2d-torus
    bandwidth_gbps:
    - 200
    - 6400
  xpu_spec:
    type: TPU
    model: tpu_v6e
    total_count: 8
    count_per_node: 8
    topology: mesh-2x2x2
  driver_version: tpu-vm-v6e-preview
Model-executor:
  framework:
    name: vllm
    compiler_tool_selection: xla
  model_plan_parallelization:
    dp_replicate: 1
    dp_shard: 1
    tp: 8
    pp: 1
    cp: 1
  communication_library:
    name: xla
  protocol_selection:
  - xla_collectives
  - ici
metric_source:
  traces:
  - json_tpu
