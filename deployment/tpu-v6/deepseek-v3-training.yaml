version: 1
model_card: trace_collection/deepseek-v3/deepseek-v3.yaml
description: DeepSeek-V3 671B MoE training on TPU v6e using torchxla with 3D parallelism + EP.
workload:
  phase: training
  granularity: model_fwd_bwd_pass
  data:
    batch_size: 64
    seq_len: 4096
    dataset: c4
hardware:
  network_topo:
    topology: 2d-torus
    bandwidth_gbps:
    - 200
    - 6400
  xpu_spec:
    type: TPU
    model: tpu_v6e
    total_count: 256
    count_per_node: 8
    topology: mesh-8x8x4
  driver_version: tpu-vm-v6e-preview
Model-executor:
  framework:
    name: torchxla
    compiler_tool_selection: xla
  model_plan_parallelization:
    dp_replicate: 1
    dp_shard: 8
    tp: 4
    pp: 8
    cp: 1
    ep: 32
  communication_library:
    name: ici
  protocol_selection:
  - rdma
  - ici
metric_source:
  traces:
  - json_tpu
