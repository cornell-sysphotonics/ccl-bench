version: 1
model_card: trace_collection/llama-3.1-8b/llama-3.1-8b.yaml
description: Llama-3.1-8B inference on NVIDIA A100 GPUs using vLLM.
workload:
  phase: inference
  granularity: model_fwd
  data:
    batch_size: 128
    seq_len: 4096
    dataset: sharegpt
hardware:
  network_topo:
    topology: fat-tree
    bandwidth_gbps:
    - 200
    - 2400
  xpu_spec:
    type: GPU
    model: nvidia_a100_80gb
    total_count: 1
    count_per_node: 1
  driver_version: cuda_12.4
Model-executor:
  framework:
    name: vllm
    compiler_tool_selection: cuda
  model_plan_parallelization:
    dp_replicate: 1
    dp_shard: 1
    tp: 1
    pp: 1
    cp: 1
  communication_library:
    name: NCCL
  protocol_selection:
  - rocev2
  - nvlink
metric_source:
  traces:
  - json
