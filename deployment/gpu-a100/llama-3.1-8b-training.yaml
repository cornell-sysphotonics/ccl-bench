version: 1
model_card: trace_collection/llama-3.1-8b/llama-3.1-8b.yaml
description: Llama-3.1-8B training on NVIDIA A100 GPUs using torchtitan with FSDP.
workload:
  phase: training
  granularity: model_fwd_bwd_pass
  data:
    batch_size: 32
    seq_len: 4096
    dataset: c4
hardware:
  network_topo:
    topology: fat-tree
    bandwidth_gbps:
    - 200
    - 2400
  xpu_spec:
    type: GPU
    model: nvidia_a100_80gb
    total_count: 8
    count_per_node: 4
  driver_version: cuda_12.4
Model-executor:
  framework:
    name: torchtitan
    compiler_tool_selection: torch.compile, triton
  model_plan_parallelization:
    dp_replicate: 1
    dp_shard: 8
    tp: 1
    pp: 1
    cp: 1
  communication_library:
    name: NCCL
  protocol_selection:
  - rocev2
  - nvlink
metric_source:
  traces:
  - json
