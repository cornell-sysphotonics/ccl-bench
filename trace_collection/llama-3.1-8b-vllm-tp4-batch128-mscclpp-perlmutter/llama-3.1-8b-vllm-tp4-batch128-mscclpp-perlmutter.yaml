version: 1

description: >
  Llama-3.1-8B inference, TP=4, batch size 128, communication=NCCL+MSCCL++.
  Global batch size is 128 requests. Traces were collected on Perlmutter with vLLM bench latency, PyTorch Kineto
  profiler, and Nsight Systems. Input length is 1024 and output length
  is 128; seq_len records input plus output tokens for MFU accounting. MSCCL++ was enabled through LD_PRELOAD; NCCL remains the
  base communication stack for collectives not intercepted by MSCCL++.

hf_url: https://huggingface.co/meta-llama/Llama-3.1-8B
trace_url: /data/ccl-bench_trace_collection/llama-3.1-8b-vllm-tp4-batch128-mscclpp-perlmutter
contributor: Kaiwen Guo
contact: kg597@cornell.edu

workload:
  model:
    phase: inference
    moe: false
    granularity: model_fwd
    model_family: llama-3.1-8b
    precision: bf16
    epochs: 1
    iteration: 1
    model_arch:
      num_params: 8030261248

      num_params_embedding: 1050673152
      num_layers: 32
      num_heads: 32
      head_dim: 128
  data:
    batch_size: 128
    batch_size_scope: global
    input_len: 1024
    output_len: 128
    seq_len: 1024 # input_len for MFU/prefill FLOP accounting
    dataset: random_1024_input_128_output
  hardware:
    network_topo:
      topology: slingshot
      bandwidth_gbps:
        - 200
        - 2400
    xpu_spec:
      type: GPU
      model: nvidia_a100
      total_count: 4
      count_per_node: 4
    driver_version: cuda_12.8

Model-executor:
  framework:
    name: vllm
    version: "0.19.0"
    compiler_tool_selection: plain_pytorch
  model_plan_parallelization:
    dp_replicate: 1
    dp_shard: 1
    tp: 4
    pp: 1
    cp: 1
    ep: 1
    pp_mb: 1
  communication_library:
    name: NCCL+MSCCL++
    version: "2.27.5"
    env:
      NCCL_IB_DISABLE: "1"
      LD_PRELOAD: /global/homes/k/kg597/mscclpp/build/lib/libmscclpp_nccl.so
  protocol_selection:
    - slingshot
    - nvlink

metric_source:
  traces:
    - nsys
    - json
  metrics_specific_trace:
    - nsys
    - vllm_bench_latency
