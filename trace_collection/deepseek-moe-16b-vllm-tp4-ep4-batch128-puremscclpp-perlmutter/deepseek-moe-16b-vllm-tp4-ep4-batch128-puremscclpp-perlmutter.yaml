version: 1

description: >
  DeepSeek-MoE-16B inference, TP=4, EP=4, batch size 128, pure MSCCL++.
  Global batch size is 128 requests. Traces were collected on Perlmutter A100 with vLLM bench latency, PyTorch
  Kineto profiler, and Nsight Systems. Input length is 1024 and output
  length is 128; seq_len records input plus output tokens for MFU accounting. Pure MSCCL++ via LD_PRELOAD and
  VLLM_NCCL_SO_PATH with --disable-custom-all-reduce and
  MSCCLPP_NCCL_LIB_PATH unset, so AllReduce and AllGather both run through
  MSCCL++ native kernels (fullmesh / packet) rather than vLLM's
  custom_all_reduce or the NCCL fallback.

hf_url: https://huggingface.co/deepseek-ai/deepseek-moe-16b-base
trace_url: /data/ccl-bench_trace_collection/deepseek-moe-16b-vllm-tp4-ep4-batch128-puremscclpp-perlmutter
contributor: Kaiwen Guo
contact: kg597@cornell.edu

workload:
  model:
    phase: inference
    moe: true
    granularity: model_fwd
    model_family: deepseek-moe-16b
    precision: bf16
    epochs: 1
    iteration: 1
    model_arch:
      num_params: 16375728128
      num_params_active: 2828650496
      num_params_embedding: 419430400
      num_layers: 28
      num_heads: 16
      head_dim: 128
  data:
    batch_size: 128
    batch_size_scope: global
    input_len: 1024
    output_len: 128
    seq_len: 1024 # input_len for MFU/prefill FLOP accounting
    dataset: random_1024_input_128_output
  hardware:
    network_topo:
      topology: slingshot
      bandwidth_gbps:
        - 200
        - 2400
    xpu_spec:
      type: GPU
      model: nvidia_a100
      total_count: 4
      count_per_node: 4
    driver_version: cuda_12.8

Model-executor:
  framework:
    name: vllm
    version: "0.19.0"
    compiler_tool_selection: plain_pytorch
  model_plan_parallelization:
    dp_replicate: 1
    dp_shard: 1
    tp: 4
    pp: 1
    cp: 1
    ep: 4
    pp_mb: 1
  communication_library:
    name: MSCCL++
    version: "0.8.0"
    env:
      NCCL_IB_DISABLE: "1"
      LD_PRELOAD: /global/homes/k/kg597/mscclpp/build/lib/libmscclpp_nccl.so
      VLLM_NCCL_SO_PATH: /global/homes/k/kg597/mscclpp/build/lib/libmscclpp_nccl.so
      MSCCLPP_NCCL_LIB_PATH: unset
      VLLM_DISABLE_CUSTOM_ALL_REDUCE: "1"
  protocol_selection:
    - slingshot
    - nvlink

metric_source:
  traces:
    - nsys
    - json
  metrics_specific_trace:
    - nsys
    - vllm_bench_latency
