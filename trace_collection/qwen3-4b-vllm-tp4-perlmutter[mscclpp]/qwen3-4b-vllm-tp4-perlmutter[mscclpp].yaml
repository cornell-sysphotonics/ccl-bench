version: 1
description: >
  Online serving of Qwen3-4B on 4 NVIDIA A100-40GB GPUs (Perlmutter) with
  Tensor Parallelism (TP)=4. AllGather collectives are intercepted by
  MSCCL++ via LD_PRELOAD; AllReduce remains on NCCL. Workload: 200 random
  prompts at 8 RPS, input_len=1024, output_len=128, BF16, CUDA graphs disabled (--enforce-eager).
hf_url: https://huggingface.co/Qwen/Qwen3-4B
trace_url: ''
workload:
  model:
    phase: inference
    moe: false
    granularity: model_fwd
    model_family: qwen-3-4b
    precision: bf16
  data:
    batch_size: 1
    seq_len: 1024
    dataset: random
    request_rate: 8
    num_prompts: 200
    output_len: 128
  hardware:
    network_topo:
      topology: slingshot
      bandwidth_gbps:
        - 200
        - 600
    xpu_spec:
      type: GPU
      model: nvidia_a100
      total_count: 4
      count_per_node: 4
    driver_version: cuda_12.9
Model-executor:
  framework:
    name: vllm
    compiler_tool_selection: ''
  model_plan_parallelization:
    dp_replicate: 1
    dp_shard: 1
    tp: 4
    pp: 1
    cp: 1
    ep: 1
    pp_mb: 1
  communication_library:
    name: NCCL+MSCCL++
    env:
      LD_PRELOAD: $HOME/mscclpp/build/lib/libmscclpp_nccl.so
      NCCL_IB_DISABLE: '1'
  protocol_selection:
    - nvlink
    - p2p
metric_source:
  traces:
    - nsys
  metrics_specific_trace: ''
