version: 1

description: >
  Llama-3.1-8B inference, TP=4, batch size 64, input length 4096, NCCL.
  Global batch size is 64 requests. Traces were collected on Perlmutter
  A100 with vLLM bench latency, PyTorch Kineto profiler, and Nsight Systems.
  Input length is 4096 and output length is 128; seq_len
  records input plus output tokens for MFU accounting. This is the
  larger-sequence follow-up collected after the batch-128 short-sequence rows.

hf_url: https://huggingface.co/meta-llama/Llama-3.1-8B
trace_url: /data/ccl-bench_trace_collection/llama-3.1-8b-vllm-tp4-batch64-in4096-out128-nccl-perlmutter
contributor: Kaiwen Guo
contact: kg597@cornell.edu

workload:
  model:
    phase: inference
    moe: false
    granularity: model_fwd
    model_family: llama-3.1-8b
    precision: bf16
    epochs: 1
    iteration: 1
    model_arch:
      num_params: 8030261248
      num_params_embedding: 1050673152
      num_layers: 32
      num_heads: 32
      head_dim: 128
  data:
    batch_size: 64
    batch_size_scope: global
    input_len: 4096
    output_len: 128
    seq_len: 4096 # input_len for MFU/prefill FLOP accounting
    dataset: random_4096_input_128_output
  hardware:
    network_topo:
      topology: slingshot
      bandwidth_gbps:
        - 200
        - 2400
    xpu_spec:
      type: GPU
      model: nvidia_a100
      total_count: 4
      count_per_node: 4
    driver_version: cuda_12.8

Model-executor:
  framework:
    name: vllm
    version: "0.19.0"
    compiler_tool_selection: plain_pytorch
  model_plan_parallelization:
    dp_replicate: 1
    dp_shard: 1
    tp: 4
    pp: 1
    cp: 1
    ep: 1
    pp_mb: 1
  communication_library:
    name: NCCL
    version: "2.27.5"
    env:
      NCCL_IB_DISABLE: "1"
  protocol_selection:
    - slingshot
    - nvlink

metric_source:
  traces:
    - nsys
    - json
  metrics_specific_trace:
    - nsys
    - vllm_bench_latency
