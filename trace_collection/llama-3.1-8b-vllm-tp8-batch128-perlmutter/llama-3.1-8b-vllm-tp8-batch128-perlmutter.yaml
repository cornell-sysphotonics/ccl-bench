version: 1

description: >
  WL2 Llama-3.1-8B inference on 8 NVIDIA A100 GPUs across 2 Perlmutter nodes
  using vLLM TP8 + NCCL. This matches the TPU 8-chip tensor-parallel comparison
  point requested for cross-architecture analysis. Global batch size is 128
  requests; input length is 1024 and output length is 128.

hf_url: https://huggingface.co/meta-llama/Llama-3.1-8B
trace_url: /data/ccl-bench_trace_collection/llama-3.1-8b-vllm-tp8-batch128-perlmutter
contributor: Kaiwen Guo
contact: kg597@cornell.edu

workload:
  model:
    phase: inference
    moe: false
    granularity: model_fwd
    model_family: llama-3.1-8b
    precision: bf16
    epochs: 1
    iteration: 1
    model_arch:
      num_params: 8030261248
      num_params_embedding: 1050673152
      num_layers: 32
      num_heads: 32
      head_dim: 128
  data:
    batch_size: 128
    batch_size_scope: global
    input_len: 1024
    output_len: 128
    seq_len: 1152
    dataset: random_1024_input_128_output
  hardware:
    network_topo:
      topology: slingshot
      bandwidth_gbps:
        - 200
        - 2400
    xpu_spec:
      type: GPU
      model: nvidia_a100
      total_count: 8
      count_per_node: 4
    driver_version: cuda_12.8

Model-executor:
  framework:
    name: vllm
    version: "0.19.0"
    compiler_tool_selection: plain_pytorch
  model_plan_parallelization:
    dp_replicate: 1
    dp_shard: 1
    tp: 8
    pp: 1
    cp: 1
    ep: 1
    pp_mb: 1
  communication_library:
    name: NCCL
    version: "2.27.5"
    env:
      NCCL_SOCKET_IFNAME: hsn
      NCCL_DEBUG: INFO
      distributed_executor_backend: external_launcher
  protocol_selection:
    - slingshot
    - nvlink

metric_source:
  traces:
    - json
    - nsys
  metrics_specific_trace:
    - nsys
    - vllm_bench_latency

collection_notes:
  workload_id: WL2
  requested_comparison: match TPU 8-chip parallelism
  launcher: torchrun external_launcher, 2 nodes x 4 GPUs
  nsys_artifacts:
    - llama-3.1-8b-vllm-tp8-batch128-perlmutter-node0.nsys-rep
    - llama-3.1-8b-vllm-tp8-batch128-perlmutter-node1.nsys-rep
    - llama-3.1-8b-vllm-tp8-batch128-perlmutter-node0.sqlite
    - llama-3.1-8b-vllm-tp8-batch128-perlmutter-node1.sqlite
