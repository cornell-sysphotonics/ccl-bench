# CCL-Bench ADRS Tuning Configuration
# Perlmutter · 16× A100 · Llama-3.1-8B · torchtitan

config_space:
  - key: tp
    type: int
    description: Tensor parallelism degree (intra-node, NVLink)
    choices: [1, 2, 4, 8, 16]
  - key: dp
    type: int
    description: Data parallelism sharding degree (FSDP)
    choices: [1, 2, 4, 8, 16]
  - key: pp
    type: int
    description: Pipeline parallelism degree
    choices: [1, 2, 4, 8, 16]
  - key: micro_batch
    type: int
    description: Pipeline microbatch size (must divide local_batch_size = 32/dp)
    choices: [1, 2, 4, 8, 16, 32]
  - key: compile_mode
    type: str
    description: torch.compile backend
    choices: [eager, inductor]
  - key: activation_checkpointing
    type: bool
    description: Full activation checkpointing to reduce peak memory
    choices: [true, false]

optimization_goal:
  direction: minimize
  metrics:
    - name: avg_step_time
      weight: 1.0
