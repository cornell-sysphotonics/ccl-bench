environment:
  nodes: 4
  gpus_per_node: 4
  gpu_model: A100
  gpu_memory_gb: 40              # enforced: passed to run.sh via -m flag
  intra_node_bandwidth_gbps: 2400
  inter_node_bandwidth_gbps: 200

workload:
  model: llama-8b
  batch_size: 32
  seq_len: 1024
  dmodel: 4096
  dff: 4096
  dvocal: 32000
  num_heads: 32
  num_kv_heads: 32
  num_stacks: 32
  weight_sharded: 0
  chakra_schema_version: "v0.0.4"

simulation:
  workload_name: llama_3_memory  # maps to examples/<workload_name>/run.sh

optimization_goal: step_time

baseline:
  tp: 4
  dp: 2
  pp: 1
