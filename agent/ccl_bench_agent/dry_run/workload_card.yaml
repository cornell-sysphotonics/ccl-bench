  policy: "\ndef generate_config(workload: dict, environment: dict) -> dict:\n   \
    \ \"\"\"Adaptive configuration policy that reasons about workload and hardware.\"\
    \"\"\n    \n    # Extract environment info\n    total_gpus = environment.get(\"\
    total_gpus\", 1)\n    gpus_per_node = environment.get(\"gpus_per_node\", 4)\n\
    \    gpu_mem = environment.get(\"gpu_memory_gb\", 40)\n    intra_bw = environment.get(\"\
    intra_node_bandwidth_gbps\", 600)\n    inter_bw = environment.get(\"inter_node_bandwidth_gbps\"\
    , 0)\n    \n    # Extract workload info\n    model_family = workload.get(\"model_family\"\
    , \"\")\n    batch_size = workload.get(\"batch_size\", 1)\n    seq_len = workload.get(\"\
    seq_len\", 512)\n    is_moe = workload.get(\"moe\", False)\n    num_layers = workload.get(\"\
    num_layers\", 32)\n    num_params = workload.get(\"num_params\", None)\n    \n\
    \    # Parse config space for valid choices\n    config_space = {}\n    for dim\
    \ in workload.get(\"config_space\", []):\n        config_space[dim[\"key\"]] =\
    \ dim[\"choices\"]\n    \n    # Estimate model size in billions\n    model_size_b\
    \ = None\n    if num_params:\n        model_size_b = num_params / 1e9\n    elif\
    \ \"8b\" in model_family.lower():\n        model_size_b = 8\n    elif \"70b\"\
    \ in model_family.lower():\n        model_size_b = 70\n    elif \"13b\" in model_family.lower():\n\
    \        model_size_b = 13\n    elif \"7b\" in model_family.lower():\n       \
    \ model_size_b = 7\n    elif \"3b\" in model_family.lower():\n        model_size_b\
    \ = 3\n    elif \"1b\" in model_family.lower():\n        model_size_b = 1\n  \
    \  else:\n        model_size_b = 8  # default guess\n    \n    # Memory estimation:\
    \ bf16 training ~= 2 bytes/param for weights + optimizer states\n    # Rough:\
    \ ~16-20 bytes per param for training (weights + grads + optimizer)\n    # With\
    \ bf16 mixed precision: ~18 bytes per param\n    bytes_per_param_training = 18\n\
    \    total_training_mem_gb = (model_size_b * 1e9 * bytes_per_param_training) /\
    \ (1024**3)\n    \n    # Helper to pick closest valid choice\n    def pick_closest(choices,\
    \ target):\n        return min(choices, key=lambda x: abs(x - target))\n    \n\
    \    def pick_le(choices, target):\n        \"\"\"Pick largest choice <= target,\
    \ or smallest if none.\"\"\"\n        valid = [c for c in sorted(choices) if c\
    \ <= target]\n        return valid[-1] if valid else min(choices)\n    \n    #\
    \ Determine number of nodes\n    num_nodes = max(1, total_gpus // gpus_per_node)\n\
    \    \n    # Strategy: minimize communication overhead\n    # For single-node:\
    \ prefer lower TP (less allreduce) if model fits in memory\n    # For multi-node:\
    \ keep TP within node, use DP across nodes\n    \n    tp_choices = sorted(config_space.get(\"\
    tp\", [1, 2, 4]))\n    dp_choices = sorted(config_space.get(\"dp\", [1, 2, 4]))\n\
    \    pp_choices = sorted(config_space.get(\"pp\", [1, 2, 4]))\n    mb_choices\
    \ = sorted(config_space.get(\"micro_batch\", [1, 2, 4]))\n    ac_choices = config_space.get(\"\
    activation_checkpointing\", [True, False])\n    \n    # Start with minimum TP\
    \ needed for memory\n    # Per-GPU memory with TP: total_training_mem_gb / tp\
    \ (rough)\n    best_tp = 1\n    for tp_cand in tp_choices:\n        mem_per_gpu\
    \ = total_training_mem_gb / tp_cand\n        # Activation memory rough estimate:\
    \ batch * seq * hidden * layers / (tp * pp)\n        # For 8B model: hidden=4096,\
    \ ~2GB activations per micro-batch at seq=512\n        act_mem_estimate = (batch_size\
    \ * seq_len * 4096 * 2) / (tp_cand * 1024**3) * (num_layers or 32) * 0.5\n   \
    \     if mem_per_gpu + act_mem_estimate < gpu_mem * 0.85:\n            best_tp\
    \ = tp_cand\n            break\n    else:\n        best_tp = max(tp_choices)\n\
    \    \n    # Ensure TP stays within node\n    best_tp = min(best_tp, gpus_per_node)\n\
    \    best_tp = pick_closest(tp_choices, best_tp)\n    \n    # PP: use only if\
    \ needed for memory\n    mem_per_gpu_with_tp = total_training_mem_gb / best_tp\n\
    \    best_pp = 1\n    if mem_per_gpu_with_tp > gpu_mem * 0.7:\n        # Need\
    \ PP to further split model\n        for pp_cand in sorted(pp_choices):\n    \
    \        if pp_cand > 1 and mem_per_gpu_with_tp / pp_cand < gpu_mem * 0.7:\n \
    \               best_pp = pp_cand\n                break\n        else:\n    \
    \        best_pp = max(pp_choices)\n    best_pp = pick_closest(pp_choices, best_pp)\n\
    \    \n    # DP: use remaining GPUs\n    target_dp = total_gpus // (best_tp *\
    \ best_pp)\n    target_dp = max(1, target_dp)\n    best_dp = pick_closest(dp_choices,\
    \ target_dp)\n    \n    # For this specific case (4 GPUs, 8B model, single node\
    \ with NVLink):\n    # tp=2, dp=2 should reduce TP communication vs tp=4 while\
    \ still fitting in memory\n    # Let's verify the product doesn't exceed total_gpus\n\
    \    while best_tp * best_dp * best_pp > total_gpus:\n        if best_dp > 1:\n\
    \            best_dp = pick_le(dp_choices, best_dp - 1)\n        elif best_pp\
    \ > 1:\n            best_pp = pick_le(pp_choices, best_pp - 1)\n        else:\n\
    \            break\n    \n    # Micro-batch: larger is better for throughput (less\
    \ overhead)\n    # but must fit in memory and batch_size must be divisible\n \
    \   per_replica_batch = max(1, batch_size // best_dp)\n    # micro_batch should\
    \ divide per_replica_batch\n    best_mb = 1\n    for mb_cand in sorted(mb_choices,\
    \ reverse=True):\n        if mb_cand <= per_replica_batch:\n            best_mb\
    \ = mb_cand\n            break\n    \n    # Activation checkpointing: enable if\
    \ memory is tight\n    act_ckpt = False\n    effective_mem = total_training_mem_gb\
    \ / (best_tp * best_pp)\n    if effective_mem > gpu_mem * 0.6:\n        act_ckpt\
    \ = True\n    \n    if act_ckpt not in ac_choices:\n        act_ckpt = ac_choices[0]\n\
    \    \n    config = {\n        \"tp\": best_tp,\n        \"dp\": best_dp,\n  \
    \      \"pp\": best_pp,\n        \"micro_batch\": best_mb,\n        \"activation_checkpointing\"\
    : act_ckpt,\n    }\n    \n    return config\n"
