  policy: "\"\"\"\nSeed configuration policy for the CCL-Bench ADRS agent.\n\nThe\
    \ agent iteratively refines `generate_config`. Each version is a self-contained\n\
    Python program: given a workload card and environment, it returns a dict of\n\
    configuration key-value pairs.\n\nExecution history is passed only to update_policy\
    \ (the LLM step), not here.\ngenerate_config is a pure function of workload and\
    \ environment.\n\"\"\"\n\n\ndef generate_config(workload: dict, environment: dict)\
    \ -> dict:\n    \"\"\"Return a configuration dict for the given workload and environment.\n\
    \n    Args:\n        workload:    Workload card fields — model_family, phase,\
    \ batch_size, seq_len,\n                     num_heads, num_layers, precision,\
    \ config_space (list of tunable\n                     dimensions with valid choices),\
    \ run_script, trace_dir, etc.\n        environment: Hardware/software descriptor\
    \ — gpu_model, gpu_memory_gb,\n                     total_gpus, gpus_per_node,\
    \ intra/inter_node_bandwidth_gbps,\n                     framework, framework_version.\n\
    \n    Returns:\n        dict of configuration key-value pairs matching config_space\
    \ keys, e.g.:\n          {\"tp\": 4, \"dp\": 8, \"pp\": 1, \"micro_batch\": 4,\
    \ \"compile_mode\": \"inductor\"}\n    \"\"\"\n    total_gpus    = environment.get(\"\
    total_gpus\", 1)\n    gpus_per_node = environment.get(\"gpus_per_node\", 8)\n\
    \    batch_size    = workload.get(\"batch_size\", 1)\n\n    # Baseline: fill one\
    \ node with TP (low-latency intra-node),\n    # scale data parallelism across\
    \ nodes.\n    tp = min(gpus_per_node, 8)\n    dp = max(1, total_gpus // tp)\n\
    \    pp = 1\n    micro_batch = max(1, batch_size // dp)\n\n    return {\n    \
    \    \"tp\": tp,\n        \"dp\": dp,\n        \"pp\": pp,\n        \"micro_batch\"\
    : micro_batch,\n        \"compile_mode\": \"eager\",\n        \"activation_checkpointing\"\
    : False,\n    }\n"
- config:
    tp: 4
    dp: 1
    pp: 1
    micro_batch: 4
    activation_checkpointing: true
  metrics:
    avg_step_time: 0.375695
  score: 0.375695
