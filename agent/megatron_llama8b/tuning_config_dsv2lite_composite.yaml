config_space:
  - key: tp
    type: int
    description: Tensor parallelism degree (intra-node, max 4 GPUs/node)
    choices: [1, 2, 4]

  - key: pp
    type: int
    description: Pipeline parallelism degree. 27 layers divisible by 1, 3, 9.
    choices: [1, 3, 9]

  - key: dp
    type: int
    description: Data parallelism / FSDP degree. tp*dp*pp does NOT need to equal 16. Using fewer GPUs improves the score.
    choices: [1, 2, 4]

  - key: ep
    type: int
    description: Expert parallelism degree. Must divide 64 (num_experts) and divide dp.
    choices: [1, 2, 4]

  - key: micro_batch_size
    type: int
    description: Micro-batch size per data-parallel rank
    choices: [1, 2, 4]

  - key: activation_checkpointing
    type: bool
    description: Recompute activations to save memory
    choices: [true, false]

# SCORING: Score = 0.5 * (16 / num_gpus_used) + 0.5 * (2.633 / avg_step_time)
# where num_gpus_used = tp * dp * pp
# Baseline: 16 GPUs at 2.633s (best all-GPU config) → score = 1.0
# Using FEWER GPUs with fast step time gives HIGHER score.
# Example: 16 GPUs, 2.633s → 0.5*(16/16) + 0.5*(2.633/2.633) = 1.0
#          12 GPUs, 1.595s → 0.5*(16/12) + 0.5*(2.633/1.595) = 1.49
#           4 GPUs, 3.0s   → 0.5*(16/4)  + 0.5*(2.633/3.0)   = 2.44

optimization_goal:
  direction: maximize
  metrics:
    - name: gpu_step_score
      weight: 1.0
